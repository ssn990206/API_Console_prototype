<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dropdown Debug</title>
  <link rel="stylesheet" href="src/css/tokens.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <style>
    body { font-family: Roboto, sans-serif; padding: 40px; background: #f5f5f5; }
    h2 { margin-bottom: 24px; }
    .row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 32px; }
    #status {
      position: fixed; top: 0; left: 0; right: 0;
      padding: 10px 16px; font-size: 14px; font-weight: 500;
      background: #de0000; color: #fff; text-align: center;
      transition: background .3s;
    }
    #status.ok { background: #0acc92; }
    #log {
      margin-top: 24px; padding: 12px; background: #fff;
      border: 1px solid #e5e7eb; border-radius: 8px;
      font-size: 13px; color: #333; min-height: 60px;
    }
  </style>
</head>
<body>

<div id="status">⚠ components.js NOT loaded yet</div>

<div style="margin-top: 48px;">
  <h2>Dropdown component test</h2>

  <div class="row">

    <!-- Single select -->
    <div>
      <p style="font-size:12px;color:#999;margin-bottom:8px;">Single-select</p>
      <div class="custom-select" data-select id="testSingle">
        <button class="custom-select__trigger" type="button">
          <span class="custom-select__value">Day</span>
          <svg class="custom-select__chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="custom-select__dropdown">
          <div class="custom-select__option selected" data-value="day">Day</div>
          <div class="custom-select__option" data-value="week">Week</div>
          <div class="custom-select__option" data-value="month">Month</div>
        </div>
      </div>
    </div>

    <!-- Multi select -->
    <div>
      <p style="font-size:12px;color:#999;margin-bottom:8px;">Multi-select</p>
      <div class="custom-select custom-select--multi" data-select data-multi style="min-width:200px" id="testMulti">
        <div class="custom-select__trigger" role="button" tabindex="0">
          <div class="custom-select__tags" data-tags></div>
          <span class="custom-select__placeholder">All API Keys</span>
          <svg class="custom-select__chevron" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </div>
        <div class="custom-select__dropdown">
          <div class="custom-select__option custom-select__option--all" data-select-all>
            <span class="custom-select__checkbox"></span>Select All
          </div>
          <div class="custom-select__option" data-value="sk-1">
            <span class="custom-select__checkbox"></span>sk-KgGrOmdrpsoSfyndgwXD...
          </div>
          <div class="custom-select__option" data-value="sk-2">
            <span class="custom-select__checkbox"></span>sk-AbCdEfGhIjKlMnOpQrSt...
          </div>
        </div>
      </div>
    </div>

  </div>

  <div id="log">Events will appear here once you interact with the dropdowns.</div>
</div>

<script src="src/js/components.js"></script>
<script>
  // Confirm components.js loaded
  document.getElementById('status').textContent = '✓ components.js loaded — click a dropdown trigger to test';
  document.getElementById('status').classList.add('ok');

  // Log change events
  document.addEventListener('change', (e) => {
    const sel = e.target.closest('.custom-select');
    if (!sel) return;
    const log = document.getElementById('log');
    const detail = e.detail
      ? (Array.isArray(e.detail) ? JSON.stringify(e.detail) : JSON.stringify(e.detail))
      : 'native change';
    log.innerHTML = `<strong>change event</strong> on #${sel.id || '(no id)'}<br>detail: ${detail}` + '<br><br>' + log.innerHTML;
  });

  // Log clicks on triggers for debug
  document.addEventListener('click', (e) => {
    const t = e.target.closest('.custom-select__trigger');
    if (!t) return;
    const sel = t.closest('.custom-select');
    const log = document.getElementById('log');
    const isOpen = sel.classList.contains('open');
    log.innerHTML = `<strong>trigger clicked</strong> on #${sel.id || '(no id)'} — now ${isOpen ? 'OPEN' : 'CLOSED'}` + '<br><br>' + log.innerHTML;
  }, true /* capture phase — fires before handler, so isOpen = state AFTER open handler */);
</script>
</body>
</html>
